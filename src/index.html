<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tactics — Turn-Based Tile Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="canvas-wrap"></div>
  <div id="ui">
    <h1>TACTICS</h1>
    <div class="turn">Turn: <span id="turn-player">Player 1</span></div>
    <div class="turns-left" id="turns-left" style="display: none;">Turns left: <span id="turns-left-value"></span></div>
    <div class="instructions">Select unit, then click a highlighted tile to move</div>
  </div>
  <div id="turn-menu" class="player-1" style="display: none;">
    <div class="unit-info no-unit" id="unit-info">
      <img class="unit-class-image" id="unit-class-image" src="" alt="" referrerpolicy="no-referrer" />
      <div class="unit-info-text">
        <div class="unit-name-row">
          <span class="unit-name" id="unit-name">— Select a unit —</span>
          <span class="unit-level-class" id="unit-level-class"></span>
        </div>
        <div class="unit-stats" id="unit-stats"></div>
      </div>
    </div>
    <div class="menu-actions">
      <span class="menu-label" id="menu-label">Player 1</span>
      <button type="button" id="btn-attack">Attack</button>
      <button type="button" id="btn-skill">Skill</button>
      <button type="button" id="btn-spell">Spell</button>
      <button type="button" id="btn-end" class="end">End</button>
    </div>
  </div>
  <div id="draft-panel">
    <div id="draft-title">Player 1: Pick a class (1/5)</div>
    <div id="draft-message"></div>
    <div id="draft-classes"></div>
  </div>
  <div id="draft-placement-card" style="display: none;"></div>
  <div id="unit-preview-card" class="player-1">
    <img class="unit-preview-image" id="unit-preview-image" src="" alt="" referrerpolicy="no-referrer" />
    <div class="unit-preview-name" id="unit-preview-name"></div>
    <div class="unit-preview-meta" id="unit-preview-meta"></div>
    <div class="unit-preview-stats" id="unit-preview-stats"></div>
  </div>
  <div id="game-over-overlay">
    <div class="game-over-title" id="game-over-title">Player 1 wins!</div>
    <div class="game-over-cards" id="game-over-cards"></div>
  </div>
  <div id="mode-select-overlay">
    <div class="mode-select-title">Select game mode</div>
    <div class="mode-select-buttons">
      <button type="button" id="mode-pvp" class="mode-btn">Player vs Player</button>
      <button type="button" id="mode-pvcpu" class="mode-btn">Player vs CPU</button>
      <button type="button" id="mode-cvcpu" class="mode-btn">CPU vs CPU</button>
    </div>
  </div>
  <script type="module" src="game.bundle.js"></script>
</body>
</html>
